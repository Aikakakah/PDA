<div class="book-widget" id="bookWidget">
    <button id="bookMaximizeBtn" class="book-max-btn" title="Toggle Fullscreen Book">
        <i class="fas fa-expand"></i>
    </button>

    <div id="floatingNotesContainer" class="floating-notes-container"></div>

    <div id="book" class="book-page">
        <div class="my-page page-cover page-cover-top" data-density="hard">
            <div class="page-content">
                <img src="Book/Pages/Page_Cover.png" alt="Page Cover" />
            </div>
        </div>
        <div class="my-page inner-cover-front" data-density="hard">
            <img src="Book/Pages/Page_Cover.png" alt="Page Cover" />
        </div>

        <div class="my-page p1" id="flashlightPage" data-density="soft">
            <div class="flashlight-container">
                <img src="Book/Pages/Blank-Page.png" class="layer-base" alt="Page two base" />
                <div class="layer-reveal" style="background-image: url('Book/Pages/Light-Page.png');"></div>
            </div>
            
            <div class="book-note resistor-color-code" data-note-id="1" 
                style="background-image: url('Book/Pages/Notes/Resistor Color Code.png');">
            </div>
        </div>

        <div class="my-page page-left" data-density="soft">
            <img src="Book/Pages/Page_3.png" alt="Page three" />
            <div class="book-note subject-printout" data-note-id="2" 
                style="background-image: url('Book/Pages/Notes/Subject Printout Doc.png');">
            </div>
        </div>
 
        <div class="my-page page-right" id="flashlightPage" data-density="soft">
            <div class="flashlight-container">
                <img src="Book/Pages/Gold Bug Puzzle.png" class="layer-base" alt="Page four" />
                <div class="layer-reveal" style="background-image: url('Book/Pages/Gold Bug Puzzle Answer.png');"></div>
            </div>
        </div>
        <div class="my-page page-left">
            <img src="Book/Pages/Page_4.png" alt="Page four" />
            <div class="book-note" data-note-id="4">📝 Sticky note</div>
        </div>
        <div class="my-page inner-cover-back">
            <img src="Book/Pages/Page_Cover.png" alt="Page Cover" />
        </div>
        <div class="my-page page-cover page-cover-bottom" data-density="hard">
            <div class="page-content">
                <img src="Book/Pages/Page_Cover.png" alt="Last page" />
            </div>
        </div>
    </div>
</div>
